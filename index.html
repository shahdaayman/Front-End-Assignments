<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert image inside a Table</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">


     <div class="header">
        <h3>Animals <span>Table</span></h3>
     </div>
    

     <div class="table">


       <table>


         <tr>
        <th> Animal image</th>
        <th>Animal Name</th>
    </tr>

    <tr>
        <td>
            <div class="animal-img">
                <img src="./img/10.jpg" alt="Dog">
            </div>
        </td>
        <td>Dog</td>
    </tr>


       <tr>
        <td>
            <div class="animal-img">
                <img src="./img/11.jpg" alt="Owl">
            </div>
        </td>
        <td>Owl</td>
    </tr>


       <tr>
        <td>
            <div class="animal-img">
                <img src="./img/1.jpg" alt="Cat">
            </div>
        </td>
        <td>Cat</td>
    </tr>

        <tr>
        <td>
            <div class="animal-img">
                <img src="./img/13.jpg" alt="Pinguin">
            </div>
        </td>
        <td>Pinguin</td>
    </tr>

          <tr>
        <td>
            <div class="animal-img">
                <img src="./img/17.jpg" alt="Chicken">
            </div>
        </td>
        <td>Chicken</td>
    </tr>
    </table>
     </div>
    </div>
  


</body>
</html>
